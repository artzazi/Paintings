<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Zazaa Ganbold</title>
  <meta name="description" content="Limitierte Seiden- und Cashmere-Modal-Schals, Schawls und Kunstdrucke von Zazaa Ganbold.">
  <link rel="canonical" href="https://zazaa.de/shop.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Shop | Zazaa Ganbold">
  <meta property="og:description" content="Limitierte Seiden- und Cashmere-Modal-Schals, Schawls und Kunstdrucke von Zazaa Ganbold.">
  <meta property="og:image" content="https://zazaa.de/bi-ba-bid.jpg">
  <meta property="og:url" content="https://zazaa.de/shop.html">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="scarves.css">
</head>
<body>

  <!--
    ============================================================
    EINRICHTUNGSHINWEISE — bitte vor dem Hochladen lesen
    ============================================================
    1. SNIPCART API KEY: Suche unten (kurz vor </body>) nach
       "DEIN-SNIPCART-PUBLIC-API-KEY" und ersetze ihn durch deinen
       echten Public API Key aus dem Snipcart-Dashboard.

    2. BILDER (Schals): Jedes .shop-panel hat aktuell eine
       Platzhalter-Textur. Ersetze in shop.js (Funktion renderShop)
       die Zeile mit class="shop-layer shop-portrait" durch ein
       echtes <img>, sobald Fotos vorhanden sind.

    3. PREISE, MOTIVE & TEXTE: Alles kommt jetzt aus de.json /
       en.json / mn.json (Schlüssel "shop"). Dort Preise, Namen,
       Beschreibungen für alle drei Sprachen anpassen.

    4. DRUCKE-FORMULAR: Das Formular weiter unten ist dasselbe wie
       vorher auf der Startseite unter "Prints & Editions" — jetzt
       hier im Shop integriert. Netlify erkennt es über
       name="print-request", das bleibt unverändert.

    5. Diese Seite ist jetzt komplett dreisprachig (EN/DE/MN), wie
       der Rest der Website. Die Sprachwahl wird zwischen den
       Seiten gemerkt (gleicher Speicherplatz wie auf der Startseite).
    ============================================================
  -->

  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Zazaa Ganbold home">
      <img src="logo.png" alt="Zazaa Ganbold logo">
      <span>ZAZAA GANBOLD</span>
    </a>
    <nav class="nav">
      <a href="index.html#works" data-i18n="nav.works">Works</a>
      <a href="index.html#series" data-i18n="nav.series">Series</a>
      <a href="shop.html" style="color:var(--accent)" data-i18n="nav.shop">Shop</a>
      <a href="index.html#about" data-i18n="nav.about">About</a>
      <a href="index.html#exhibitions" data-i18n="nav.exhibitions">Exhibitions</a>
      <a href="index.html#contact" data-i18n="nav.contact">Contact</a>
      <span class="language-switch">
        <button data-lang="en">EN</button>
        <button data-lang="de">DE</button>
        <button data-lang="mn">MN</button>
      </span>
    </nav>
  </header>

  <section class="shop-hero">
    <p class="eyebrow" id="shopEyebrow"></p>
    <h1 id="shopTitle"></h1>
    <p id="shopText"></p>
  </section>

  <div class="shop-fabric-strip">
    <div>
      <h3 id="fabricTitle1"></h3>
      <p id="fabricText1"></p>
    </div>
    <div>
      <h3 id="fabricTitle2"></h3>
      <p id="fabricText2"></p>
    </div>
    <div>
      <h3 id="fabricTitle3"></h3>
      <p id="fabricText3"></p>
    </div>
  </div>

  <section class="shop-section">
    <div class="section-heading">
      <p class="eyebrow" id="scarvesEyebrow"></p>
      <h2 id="scarvesTitle"></h2>
    </div>
    <div class="shop-grid" id="shopGrid"></div>
    <p class="shop-note" id="shopNote"></p>
  </section>

  <section id="prints" class="section prints-section">
    <div class="section-heading">
      <p class="eyebrow" data-i18n="sections.printsEyebrow">Prints &amp; Editions</p>
      <h2 data-i18n="sections.printsTitle">Own a Piece, Framed or Unframed</h2>
    </div>
    <div class="prints-wrap">
      <p class="prints-intro" data-i18n="prints.intro"></p>
      <form class="prints-form" id="print-request-form" name="print-request" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="print-request">
        <p class="hidden-field"><label>Don't fill this out: <input name="bot-field"></label></p>
        <div class="form-row">
          <label>
            <span data-i18n="prints.formName">Name</span>
            <input type="text" name="name" required>
          </label>
          <label>
            <span data-i18n="prints.formEmail">Email</span>
            <input type="email" name="email" required>
          </label>
        </div>
        <div class="form-row">
          <label>
            <span data-i18n="prints.formArtwork">Artwork title</span>
            <input type="text" name="artwork">
          </label>
          <label>
            <span data-i18n="prints.formSize">Preferred size</span>
            <input type="text" name="size">
          </label>
        </div>
        <label class="full">
          <span data-i18n="prints.formMessage">Message</span>
          <textarea name="message" rows="4"></textarea>
        </label>
        <button type="submit" class="text-link form-submit" data-i18n="prints.formSubmit">Send Request</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <p>ZAZAA GANBOLD</p>
    <p id="footerArtist">Contemporary Artist</p>
    <p>Germany · Portugal · Mongolia</p>
    <p>© 2026 Zazaa Ganbold. All rights reserved.</p>
  </footer>

  <script src="shop.js"></script>

  <!--
    SNIPCART EINBINDUNG
    Ersetze "DEIN-SNIPCART-PUBLIC-API-KEY" mit deinem echten
    Public API Key (Snipcart Dashboard > Store Settings > API Keys).
  -->
  <div hidden id="snipcart" data-api-key="DEIN-SNIPCART-PUBLIC-API-KEY" data-config-modal-style="side"></div>
  <script async src="https://cdn.snipcart.com/themes/v3.7.3/default/snipcart.js"></script>
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.7.3/default/snipcart.css" />

</body>
</html>
